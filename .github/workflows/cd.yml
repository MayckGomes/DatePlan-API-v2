name: teste

on:
  push:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: configurar jdk 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: gerar o build jar
        run: ./gradlew bootjar

      - name: verificar o caminho do arquivo
        run: ls -la build/libs/
  


