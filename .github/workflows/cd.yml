name: cd

on:
  push:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: config jdk 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: generate jar
        run: ./gradlew bootjar

      - name: rename jar
        run: mv build/libs/dateplan-api-0.0.1-SNAPSHOT.jar build/libs/dateplan-api.jar 

      - name: upload jar
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSHKEY }}
          source: build/libs/dateplan-api.jar
          target: /home/ubuntu/api/
          strip_components: 2 

      - name: restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSHKEY }}
          script: sudo systemctl restart dateplanapi.service
      
        


